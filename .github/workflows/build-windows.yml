name: Build FVD++ Windows

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-qt5
          mingw-w64-x86_64-glew
          mingw-w64-x86_64-glm
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-gcc
          make
          git
          unzip

    - name: Build lib3ds from source
      run: |
        curl -L "https://github.com/dspinellis/lib3ds/archive/refs/heads/master.zip" -o lib3ds.zip
        unzip lib3ds.zip
        cd lib3ds-master/src
        gcc -c *.c -I. -O2
        ar rcs /mingw64/lib/lib3ds.a *.o
        cp lib3ds.h /mingw64/include/
        echo "lib3ds compilé avec succès"

    - name: Patch fvd.pro for MSYS2
      run: |
        sed -i 's|INCLUDEPATH +=
