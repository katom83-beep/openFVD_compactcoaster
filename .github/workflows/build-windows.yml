name: Build FVD++ Windows

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt5
      uses: jurplel/install-qt-action@v3
      with:
        version: '5.15.2'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw81'

    - name: Install GLEW and GLM via vcpkg
      run: |
        vcpkg install glew:x64-windows glm:x64-windows
        echo "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
      shell: pwsh

    - name: Build lib3ds from source
      run: |
        git clone https://github.com/AF83/lib3ds.git lib3ds-src --depth=1
        cd lib3ds-src
        cmake . -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="C:/lib3ds"
        mingw32-make -j4
        mingw32-make install
      shell: pwsh

    - name: Patch fvd.pro with CI paths
      run: |
        $vcpkg = $env:VCPKG_INSTALLATION_ROOT
        $pro = Get-Content fvd.pro -Raw
        $pro = $pro -replace 'INCLUDEPATH \+= "C:\\Development\\Libraries\\glew[^"]*"', "INCLUDEPATH += `"$vcpkg\installed\x64-windows\include`""
        $pro = $pro -replace 'INCLUDEPATH \+= "C:\\Development\\Libraries\\glm[^"]*"', "INCLUDEPATH += `"$vcpkg\installed\x64-windows\include`""
        $pro = $pro -replace 'INCLUDEPATH \+= "C:\\Development\\Libraries\\lib3ds[^"]*"', "INCLUDEPATH += `"C:\lib3ds\include`""
        $pro = $pro -replace 'LIBS \+= "C:\\Development\\Libraries\\glew[^"]*glew32\.lib"', "LIBS += `"$vcpkg\installed\x64-windows\lib\glew32.lib`""
        $pro = $pro -replace 'LIBS \+= "C:\\Development\\Libraries\\glew[^"]*glew32\.dll"', "LIBS += `"$vcpkg\installed\x64-windows\bin\glew32.dll`""
        $pro = $pro -replace 'LIBS \+= "C:\\Development\\Libraries\\lib3ds[^"]*"', "LIBS += `"C:\lib3ds\lib\lib3ds.lib`""
        Set-Content fvd.pro $pro
      shell: pwsh

    - name: Run qmake
      run: qmake fvd.pro CONFIG+=release
      shell: cmd

    - name: Build
      run: mingw32-make -j4
      shell: cmd

    - name: Deploy Qt DLLs
      run: |
        mkdir deploy
        copy release\FVD.exe deploy\
        copy $env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin\glew32.dll deploy\
        windeployqt --release --no-translations deploy\FVD.exe
      shell: pwsh

    - name: Copy runtime resources
      run: |
        copy background.png deploy\
        copy metal.png deploy\
        copy metalnormals.png deploy\
        xcopy shaders deploy\shaders\ /E /I /Q
        xcopy sky deploy\sky\ /E /I /Q
      shell: cmd

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FVD-plus-plus-monorail450-windows
        path: deploy\
        retention-days: 30
