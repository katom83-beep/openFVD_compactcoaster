name: Build FVD++ Windows

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-qt5
          mingw-w64-x86_64-glew
          mingw-w64-x86_64-glm
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-gcc
          make
          git
          unzip
          python3

    - name: Install compatible GLM version
      run: |
        pacman -R --noconfirm mingw-w64-x86_64-glm || true
        curl -L "https://github.com/g-truc/glm/archive/refs/tags/0.9.9.8.zip" -o glm.zip
        unzip glm.zip
        cp -r glm-0.9.9.8/glm /mingw64/include/

    - name: Build lib3ds from source
      run: |
        curl -L "https://github.com/dspinellis/lib3ds/archive/refs/heads/master.zip" -o lib3ds.zip
        unzip lib3ds.zip
        cd lib3ds-master/src
        gcc -c *.c -I. -O2
        ar rcs /mingw64/lib/lib3ds.a *.o
        cp lib3ds.h /mingw64/include/

    - name: Patch fvd.pro for MSYS2
      run: |
        python3 -c "
        import re
        content = open('fvd.pro', 'r').read()
        content = re.sub(r'INCLUDEPATH \+= \"C:\\\\Development\\\\Libraries\\\\glew[^\"]*\"', 'INCLUDEPATH += /mingw64/include', content)
        content = re.sub(r'INCLUDEPATH \+= \"C:\\\\Development\\\\Libraries\\\\glm[^\"]*\"', 'INCLUDEPATH += /mingw64/include', content)
        content = re.sub(r'INCLUDEPATH \+= \"C:\\\\Development\\\\Libraries\\\\lib3ds[^\"]*\"', 'INCLUDEPATH += /mingw64/include', content)
        content = re.sub(r'LIBS \+= \"C:\\\\Development\\\\Libraries\\\\glew[^\"]*glew32\.lib\"', '', content)
        content = re.sub(r'LIBS \+= \"C:\\\\Development\\\\Libraries\\\\glew[^\"]*glew32\.dll\"', '', content)
        content = re.sub(r'LIBS \+= \"C:\\\\Development\\\\Libraries\\\\lib3ds[^\"]*\"', '', content)
        content = content.replace('-lOpenGL32', '-lopengl32')
        content = content.replace('-lGlU32', '-lglu32')
        content += '\nLIBS += -lglew32 -l3ds\n'
        content += '\nDEFINES += GLM_ENABLE_EXPERIMENTAL\n'
        open('fvd.pro', 'w').write(content)
        print('fvd.pro patche avec succes')
        "
    - name: Find qmake
      run: find /mingw64 -name "qmake*" 2>/dev/null || echo "pas trouve dans mingw64"

    - name: Run qmake
      run: /mingw64/bin/qmake-qt5 fvd.pro CONFIG+=release

    - name: Build
      run: make -j4

    - name: Find windeployqt
      run: find /mingw64 -name "windeployqt*" 2>/dev/null

    - name: Collect files
      run: |
        mkdir -p deploy
        cp release/FVD.exe deploy/
        # Copier TOUTES les DLL de mingw64 (on fait le tri après)
        cp /mingw64/bin/*.dll deploy/
        # Copier toutes les DLL Qt
        /mingw64/bin/windeployqt-qt5 --release --no-translations deploy/FVD.exe || true
        # Plugin Qt platform Windows (obligatoire)
        mkdir -p deploy/platforms
        cp /mingw64/share/qt5/plugins/platforms/qwindows.dll deploy/platforms/ || true
        cp /mingw64/share/qt5/plugins/platforms/qdirect2d.dll deploy/platforms/ || true
        # Ressources
        cp background.png metal.png metalnormals.png deploy/
        cp -r shaders deploy/
        cp -r sky deploy/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FVD-plus-plus-monorail450-windows
        path: deploy/
        retention-days: 30
