name: Build FVD++ Windows

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-qt5
          mingw-w64-x86_64-glew
          mingw-w64-x86_64-glm
          mingw-w64-x86_64-lib3ds
          mingw-w64-x86_64-cmake
          make

    - name: Patch fvd.pro for MSYS2
      run: |
        sed -i 's|INCLUDEPATH += "C:\\Development\\Libraries\\glew[^"]*"|INCLUDEPATH += "/mingw64/include"|g' fvd.pro
        sed -i 's|INCLUDEPATH += "C:\\Development\\Libraries\\glm[^"]*"|INCLUDEPATH += "/mingw64/include"|g' fvd.pro
        sed -i 's|INCLUDEPATH += "C:\\Development\\Libraries\\lib3ds[^"]*"|INCLUDEPATH += "/mingw64/include"|g' fvd.pro
        sed -i 's|LIBS += "C:\\Development\\Libraries\\glew[^"]*glew32\.lib"||g' fvd.pro
        sed -i 's|LIBS += "C:\\Development\\Libraries\\glew[^"]*glew32\.dll"||g' fvd.pro
        sed -i 's|LIBS += "C:\\Development\\Libraries\\lib3ds[^"]*"||g' fvd.pro
        sed -i 's|-lOpenGL32|-lopengl32|g' fvd.pro
        sed -i 's|-lGlU32|-lglu32|g' fvd.pro
        echo "" >> fvd.pro
        echo "LIBS += -lglew32 -l3ds" >> fvd.pro
        cat fvd.pro | grep -E "INCLUDEPATH|LIBS"

    - name: Run qmake
      run: qmake fvd.pro CONFIG+=release

    - name: Build
      run: make -j4

    - name: Collect files
      run: |
        mkdir -p deploy
        cp release/FVD.exe deploy/
        cp /mingw64/bin/glew32.dll deploy/
        cp /mingw64/bin/lib3ds*.dll deploy/ 2>/dev/null || true
        windeployqt --release --no-translations deploy/FVD.exe
        cp background.png metal.png metalnormals.png deploy/
        cp -r shaders deploy/
        cp -r sky deploy/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FVD-plus-plus-monorail450-windows
        path: deploy/
        retention-days: 30
